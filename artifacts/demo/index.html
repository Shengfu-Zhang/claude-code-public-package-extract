<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=./claude-code-loop-simulator.html" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claude Code Runtime Studio</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f2ee;
        --ink: #1f2a28;
        --ink-soft: #5e6c67;
        --line: rgba(35, 46, 43, 0.12);
        --accent: #1c6454;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #f8f7f4 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      main {
        width: min(100%, 640px);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.84);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        font-size: clamp(2.1rem, 4vw, 3.1rem);
        letter-spacing: -0.03em;
      }

      p {
        margin-top: 12px;
        color: var(--ink-soft);
        line-height: 1.65;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: inherit;
        text-decoration: none;
      }

      a.primary {
        border-color: transparent;
        background: var(--accent);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening Runtime Studio…</h1>
      <p>
        If the redirect does not fire, choose a language below.
      </p>
      <div class="links">
        <a class="primary" href="./claude-code-loop-simulator.html">English</a>
        <a href="./claude-code-loop-simulator.zh.html">中文</a>
      </div>
    </main>
  </body>
</html>
